binance_read:
  apiKey: "API_KEY_READ"
  secret: "SECRET_KEY_READ"

strategy:
  # Backward compatible: keep `symbol` for single-coin mode.
  symbol: "ETH/USDT"
  # Multi-coin scan: if provided, bot will scan all symbols here.
  symbols: ["ETH/USDT", "BTC/USDT", "SOL/USDT"]
  poll_interval_sec: 60
  window_short_min: 5
  window_long_min: 15
  # Dip entry (used for scoring, not strict AND-filter)
  dump_threshold_pct: -0.3
  dump_threshold_1h_pct: -1.0
  # Adaptive (trend strong -> require smaller dip, allow higher RSI)
  dump_threshold_1h_pct_trend_strong: -0.5
  rsi_reversal_threshold_5m_trend_strong: 45
  pump_threshold_pct: 1.5

  # Entry scoring (Dip + Breakout compete; best score wins)
  entry_score_min: 2.0

  # Breakout mode
  breakout_enabled: true
  breakout_lookback_hours: 3
  breakout_buffer_pct: 0.05
  breakout_volume_mult: 1.5

risk:
  capital_usdt: 20
  position_pct: 0.25
  max_loss_pct_per_trade: 2.0
  target_profit_pct_min: 1.0
  target_profit_pct_max: 2.0
  daily_pnl_limit_pct: 3.0
  max_trades_per_day: 3

telegram:
  enabled: false
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
  chat_id: "YOUR_CHAT_ID"
